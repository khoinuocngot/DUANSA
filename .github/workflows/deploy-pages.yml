name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase secrets into public artifact
        shell: pwsh
        env:
          GROUP2_COMMENT_FIREBASE_API_KEY: ${{ secrets.GROUP2_COMMENT_FIREBASE_API_KEY }}
          GROUP2_COMMENT_FIREBASE_AUTH_DOMAIN: ${{ secrets.GROUP2_COMMENT_FIREBASE_AUTH_DOMAIN }}
          GROUP2_COMMENT_FIREBASE_PROJECT_ID: ${{ secrets.GROUP2_COMMENT_FIREBASE_PROJECT_ID }}
          GROUP2_COMMENT_FIREBASE_STORAGE_BUCKET: ${{ secrets.GROUP2_COMMENT_FIREBASE_STORAGE_BUCKET }}
          GROUP2_COMMENT_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.GROUP2_COMMENT_FIREBASE_MESSAGING_SENDER_ID }}
          GROUP2_COMMENT_FIREBASE_APP_ID: ${{ secrets.GROUP2_COMMENT_FIREBASE_APP_ID }}
          GROUP2_COMMENT_FIREBASE_MEASUREMENT_ID: ${{ secrets.GROUP2_COMMENT_FIREBASE_MEASUREMENT_ID }}
          GROUP2_COMMENT_FIREBASE_DATABASE_URL: ${{ secrets.GROUP2_COMMENT_FIREBASE_DATABASE_URL }}
          GROUP2_GAME_FIREBASE_API_KEY: ${{ secrets.GROUP2_GAME_FIREBASE_API_KEY }}
          GROUP2_GAME_FIREBASE_AUTH_DOMAIN: ${{ secrets.GROUP2_GAME_FIREBASE_AUTH_DOMAIN }}
          GROUP2_GAME_FIREBASE_PROJECT_ID: ${{ secrets.GROUP2_GAME_FIREBASE_PROJECT_ID }}
          GROUP2_GAME_FIREBASE_STORAGE_BUCKET: ${{ secrets.GROUP2_GAME_FIREBASE_STORAGE_BUCKET }}
          GROUP2_GAME_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.GROUP2_GAME_FIREBASE_MESSAGING_SENDER_ID }}
          GROUP2_GAME_FIREBASE_APP_ID: ${{ secrets.GROUP2_GAME_FIREBASE_APP_ID }}
          GROUP2_GAME_FIREBASE_MEASUREMENT_ID: ${{ secrets.GROUP2_GAME_FIREBASE_MEASUREMENT_ID }}
          GROUP2_GAME_FIREBASE_DATABASE_URL: ${{ secrets.GROUP2_GAME_FIREBASE_DATABASE_URL }}
          GROUP2_ARCADE_FIREBASE_API_KEY: ${{ secrets.GROUP2_ARCADE_FIREBASE_API_KEY }}
          GROUP2_ARCADE_FIREBASE_AUTH_DOMAIN: ${{ secrets.GROUP2_ARCADE_FIREBASE_AUTH_DOMAIN }}
          GROUP2_ARCADE_FIREBASE_PROJECT_ID: ${{ secrets.GROUP2_ARCADE_FIREBASE_PROJECT_ID }}
          GROUP2_ARCADE_FIREBASE_STORAGE_BUCKET: ${{ secrets.GROUP2_ARCADE_FIREBASE_STORAGE_BUCKET }}
          GROUP2_ARCADE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.GROUP2_ARCADE_FIREBASE_MESSAGING_SENDER_ID }}
          GROUP2_ARCADE_FIREBASE_APP_ID: ${{ secrets.GROUP2_ARCADE_FIREBASE_APP_ID }}
          GROUP2_ARCADE_FIREBASE_MEASUREMENT_ID: ${{ secrets.GROUP2_ARCADE_FIREBASE_MEASUREMENT_ID }}
          GROUP2_ARCADE_FIREBASE_DATABASE_URL: ${{ secrets.GROUP2_ARCADE_FIREBASE_DATABASE_URL }}
        run: |
          $required = @{
            GROUP2_COMMENT_FIREBASE_API_KEY = $env:GROUP2_COMMENT_FIREBASE_API_KEY
            GROUP2_COMMENT_FIREBASE_AUTH_DOMAIN = $env:GROUP2_COMMENT_FIREBASE_AUTH_DOMAIN
            GROUP2_COMMENT_FIREBASE_PROJECT_ID = $env:GROUP2_COMMENT_FIREBASE_PROJECT_ID
            GROUP2_COMMENT_FIREBASE_STORAGE_BUCKET = $env:GROUP2_COMMENT_FIREBASE_STORAGE_BUCKET
            GROUP2_COMMENT_FIREBASE_MESSAGING_SENDER_ID = $env:GROUP2_COMMENT_FIREBASE_MESSAGING_SENDER_ID
            GROUP2_COMMENT_FIREBASE_APP_ID = $env:GROUP2_COMMENT_FIREBASE_APP_ID
            GROUP2_COMMENT_FIREBASE_DATABASE_URL = $env:GROUP2_COMMENT_FIREBASE_DATABASE_URL
            GROUP2_GAME_FIREBASE_API_KEY = $env:GROUP2_GAME_FIREBASE_API_KEY
            GROUP2_GAME_FIREBASE_AUTH_DOMAIN = $env:GROUP2_GAME_FIREBASE_AUTH_DOMAIN
            GROUP2_GAME_FIREBASE_PROJECT_ID = $env:GROUP2_GAME_FIREBASE_PROJECT_ID
            GROUP2_GAME_FIREBASE_STORAGE_BUCKET = $env:GROUP2_GAME_FIREBASE_STORAGE_BUCKET
            GROUP2_GAME_FIREBASE_MESSAGING_SENDER_ID = $env:GROUP2_GAME_FIREBASE_MESSAGING_SENDER_ID
            GROUP2_GAME_FIREBASE_APP_ID = $env:GROUP2_GAME_FIREBASE_APP_ID
            GROUP2_GAME_FIREBASE_DATABASE_URL = $env:GROUP2_GAME_FIREBASE_DATABASE_URL
            GROUP2_ARCADE_FIREBASE_API_KEY = $env:GROUP2_ARCADE_FIREBASE_API_KEY
            GROUP2_ARCADE_FIREBASE_AUTH_DOMAIN = $env:GROUP2_ARCADE_FIREBASE_AUTH_DOMAIN
            GROUP2_ARCADE_FIREBASE_PROJECT_ID = $env:GROUP2_ARCADE_FIREBASE_PROJECT_ID
            GROUP2_ARCADE_FIREBASE_STORAGE_BUCKET = $env:GROUP2_ARCADE_FIREBASE_STORAGE_BUCKET
            GROUP2_ARCADE_FIREBASE_MESSAGING_SENDER_ID = $env:GROUP2_ARCADE_FIREBASE_MESSAGING_SENDER_ID
            GROUP2_ARCADE_FIREBASE_APP_ID = $env:GROUP2_ARCADE_FIREBASE_APP_ID
            GROUP2_ARCADE_FIREBASE_DATABASE_URL = $env:GROUP2_ARCADE_FIREBASE_DATABASE_URL
          }

          $missing = $required.GetEnumerator() | Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } | Select-Object -ExpandProperty Key
          if ($missing) {
            throw "Missing GitHub Secrets: $($missing -join ', ')"
          }

          $replacements = @{
            "__GROUP2_COMMENT_FIREBASE_API_KEY__" = $env:GROUP2_COMMENT_FIREBASE_API_KEY
            "__GROUP2_COMMENT_FIREBASE_AUTH_DOMAIN__" = $env:GROUP2_COMMENT_FIREBASE_AUTH_DOMAIN
            "__GROUP2_COMMENT_FIREBASE_PROJECT_ID__" = $env:GROUP2_COMMENT_FIREBASE_PROJECT_ID
            "__GROUP2_COMMENT_FIREBASE_STORAGE_BUCKET__" = $env:GROUP2_COMMENT_FIREBASE_STORAGE_BUCKET
            "__GROUP2_COMMENT_FIREBASE_MESSAGING_SENDER_ID__" = $env:GROUP2_COMMENT_FIREBASE_MESSAGING_SENDER_ID
            "__GROUP2_COMMENT_FIREBASE_APP_ID__" = $env:GROUP2_COMMENT_FIREBASE_APP_ID
            "__GROUP2_COMMENT_FIREBASE_MEASUREMENT_ID__" = $env:GROUP2_COMMENT_FIREBASE_MEASUREMENT_ID
            "__GROUP2_COMMENT_FIREBASE_DATABASE_URL__" = $env:GROUP2_COMMENT_FIREBASE_DATABASE_URL
            "__GROUP2_GAME_FIREBASE_API_KEY__" = $env:GROUP2_GAME_FIREBASE_API_KEY
            "__GROUP2_GAME_FIREBASE_AUTH_DOMAIN__" = $env:GROUP2_GAME_FIREBASE_AUTH_DOMAIN
            "__GROUP2_GAME_FIREBASE_PROJECT_ID__" = $env:GROUP2_GAME_FIREBASE_PROJECT_ID
            "__GROUP2_GAME_FIREBASE_STORAGE_BUCKET__" = $env:GROUP2_GAME_FIREBASE_STORAGE_BUCKET
            "__GROUP2_GAME_FIREBASE_MESSAGING_SENDER_ID__" = $env:GROUP2_GAME_FIREBASE_MESSAGING_SENDER_ID
            "__GROUP2_GAME_FIREBASE_APP_ID__" = $env:GROUP2_GAME_FIREBASE_APP_ID
            "__GROUP2_GAME_FIREBASE_MEASUREMENT_ID__" = $env:GROUP2_GAME_FIREBASE_MEASUREMENT_ID
            "__GROUP2_GAME_FIREBASE_DATABASE_URL__" = $env:GROUP2_GAME_FIREBASE_DATABASE_URL
            "__GROUP2_ARCADE_FIREBASE_API_KEY__" = $env:GROUP2_ARCADE_FIREBASE_API_KEY
            "__GROUP2_ARCADE_FIREBASE_AUTH_DOMAIN__" = $env:GROUP2_ARCADE_FIREBASE_AUTH_DOMAIN
            "__GROUP2_ARCADE_FIREBASE_PROJECT_ID__" = $env:GROUP2_ARCADE_FIREBASE_PROJECT_ID
            "__GROUP2_ARCADE_FIREBASE_STORAGE_BUCKET__" = $env:GROUP2_ARCADE_FIREBASE_STORAGE_BUCKET
            "__GROUP2_ARCADE_FIREBASE_MESSAGING_SENDER_ID__" = $env:GROUP2_ARCADE_FIREBASE_MESSAGING_SENDER_ID
            "__GROUP2_ARCADE_FIREBASE_APP_ID__" = $env:GROUP2_ARCADE_FIREBASE_APP_ID
            "__GROUP2_ARCADE_FIREBASE_MEASUREMENT_ID__" = $env:GROUP2_ARCADE_FIREBASE_MEASUREMENT_ID
            "__GROUP2_ARCADE_FIREBASE_DATABASE_URL__" = $env:GROUP2_ARCADE_FIREBASE_DATABASE_URL
          }

          $files = Get-ChildItem -Path . -Recurse -File | Where-Object { $_.Extension -in '.html', '.js', '.css' }
          foreach ($file in $files) {
            $content = Get-Content -Path $file.FullName -Raw
            foreach ($entry in $replacements.GetEnumerator()) {
              $content = $content.Replace($entry.Key, [string]$entry.Value)
            }
            Set-Content -Path $file.FullName -Value $content -Encoding UTF8
          }

          New-Item -ItemType File -Path .nojekyll -Force | Out-Null

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
